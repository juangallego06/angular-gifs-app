<div id="nav" class="w-full px-6">
  @for (option of menuOptions; track option.route) {
    <a
      [routerLink]="option.route"
      routerLinkActive="bg-blue-800 text-white"
      class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition"
    >
      <i [class]="option.icon"></i>

      <div class="flex flex-col">
        <span class="text-lg font-bold text-white">
          {{ option.label }}
        </span>

        <span class="text-sm text-white/50 hidden md:block">
          {{ option.subLabel }}
        </span>
      </div>
    </a>
  }

  @for (key of gifsService.searchHistoryKeys(); track key) {
    <a
      [routerLink]="['/dashboard/history', key]"
      routerLinkActive="bg-blue-800 text-white"
      class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition"
    >
      <i class="fa-solid fa-clock-rotate-left"></i>

      <div class="flex flex-col">
        <span class="text-lg font-bold text-white">
          {{ key }}
        </span>
      </div>
    </a>
  }
</div>
